services:
  app:
    image: ${DOCKERHUB_USERNAME}/bookchigi-bakchigi:latest
    container_name: book-app
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: always

  redis:
    image: redis:7
    container_name: book-redis
    command: redis-server --appendonly yes --requirepass ${SPRING_REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    restart: always

  nginx:
    image: nginx:1.25-alpine
    container_name: book-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    restart: always

  # =========================
  # Exporters
  # =========================

  node-exporter:
    image: prom/node-exporter
    container_name: book-node-exporter
    ports:
      - "9100:9100"
    restart: always

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: book-redis-exporter
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${SPRING_REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      - redis
    restart: always

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter
    container_name: book-nginx-exporter
    command:
      - -nginx.scrape-uri=http://nginx:80/stub_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    restart: always

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: book-mysql-exporter
    restart: always
    ports:
      - "9104:9104"
    volumes:
      - ./mysql-exporter.cnf:/etc/mysql-exporter.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysql-exporter.cnf"
      - "--collect.global_status"
      - "--collect.info_schema.innodb_metrics"
      - "--collect.info_schema.processlist"

  certbot:
    image: certbot/certbot
    profiles: ["prod"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  redis-data: