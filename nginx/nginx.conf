events {}

http {

    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=10r/s;

    ##
    ## Upstream
    ##
    upstream spring {
        server app:8080;
    }

    ##
    ## HTTP → HTTPS Redirect + Certbot Challenge
    ##
    server {
        listen 80;
        server_name api.bookchigi-bakchigi.site;

        # Let's Encrypt 인증용 경로
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 나머지는 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    ##
    ## HTTPS 서버
    ##
    server {
        listen 443 ssl;
        http2 on;
        server_name api.bookchigi-bakchigi.site;

        ##
        ## SSL 설정
        ##
        ssl_certificate /etc/letsencrypt/live/api.bookchigi-bakchigi.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.bookchigi-bakchigi.site/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        ##
        ## 일반 API 요청
        ##
        location / {

            limit_req zone=ip_limit burst=10 nodelay;

            proxy_pass http://spring;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 60s;
        }

        ##
        ## SSE 전용 경로
        ##
        location /subscribe {

            proxy_pass http://spring;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_read_timeout 3600s;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        ##
        ## WebSocket 전용 경로 (예: /ws/)
        ##
        location /ws {

            proxy_pass http://spring;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        ##
        ## Actuator 내부망 제한
        ##
        location /actuator {
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://spring;
        }

        location /stub_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}