spring:
  application:
    name: bookchigi-bakchigi

  jackson:
    time-zone: UTC

  datasource:
    url: jdbc:h2:mem:bookchigi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: bookchigi-bakchigi

server:
  port: 8080
  shutdown: graceful

app:
  auth:
    access-token-expire-millis: 1800000
    refresh-token-expire-millis: 604800000
  cookie:
    secure: false
    same-site: Lax

jwt:
  secret: ${JWT_SECRET}

frontend:
  url: ${FRONTEND_URL}
